
<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <defs>
    <linearGradient id="tr-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA"></stop>
      <stop offset="100%" stop-color="#6B46C1"></stop>
    </linearGradient>
  </defs>

  
  <symbol id="monogram-tr" viewBox="0 0 64 64">
    <circle cx="32" cy="32" r="30" fill="none" stroke="url(#tr-grad)" stroke-width="1.2"></circle>
    <text x="32" y="42" text-anchor="middle" font-family="Source Serif 4, Georgia, serif" font-style="italic" font-weight="300" font-size="30" fill="url(#tr-grad)" letter-spacing="-0.02em">tr</text>
  </symbol>

  
  <symbol id="logo-wordmark" viewBox="0 0 220 32">
    <text x="0" y="22" font-family="Source Serif 4, Georgia, serif" font-style="italic" font-weight="300" font-size="22" fill="currentColor" letter-spacing="-0.02em">tati</text>
    <text x="60" y="22" font-family="Inter, sans-serif" font-weight="200" font-size="22" fill="currentColor" letter-spacing="-0.04em">ribeiro</text>
  </symbol>

  
  <symbol id="icon-node" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
    <circle cx="12" cy="12" r="3"></circle>
    <circle cx="12" cy="12" r="9" opacity="0.4"></circle>
    <line x1="12" y1="0" x2="12" y2="3"></line>
    <line x1="12" y1="21" x2="12" y2="24"></line>
    <line x1="0" y1="12" x2="3" y2="12"></line>
    <line x1="21" y1="12" x2="24" y2="12"></line>
  </symbol>

  
  <symbol id="icon-rose" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
    <circle cx="12" cy="12" r="3"></circle>
    <path d="M12 9 C 9 9, 7 11, 9 13 C 7 15, 9 17, 12 15 C 15 17, 17 15, 15 13 C 17 11, 15 9, 12 9 Z"></path>
    <path d="M12 15 L 12 22"></path>
  </symbol>

  
  <symbol id="icon-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
    <line x1="3" y1="12" x2="21" y2="12"></line>
    <polyline points="14 5 21 12 14 19"></polyline>
  </symbol>

  
  <symbol id="icon-spark" viewBox="0 0 24 24" fill="currentColor">
    <path d="M12 2 L 13.5 9 L 21 12 L 13.5 15 L 12 22 L 10.5 15 L 3 12 L 10.5 9 Z"></path>
  </symbol>

  
  <symbol id="icon-mic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
    <rect x="9" y="3" width="6" height="11" rx="3"></rect>
    <path d="M5 11 v 1 a 7 7 0 0 0 14 0 v -1"></path>
    <line x1="12" y1="19" x2="12" y2="22"></line>
  </symbol>

  
  <symbol id="icon-book" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
    <path d="M4 4 h 7 a 2 2 0 0 1 2 2 v 14 a 2 2 0 0 0 -2 -2 H 4 Z"></path>
    <path d="M20 4 h -7 a 2 2 0 0 0 -2 2 v 14 a 2 2 0 0 1 2 -2 H 20 Z"></path>
  </symbol>

  
  <symbol id="icon-compass" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
    <circle cx="12" cy="12" r="9"></circle>
    <polygon points="16 8 12 16 8 16 12 8" fill="currentColor" stroke="none" opacity="0.7"></polygon>
    <polygon points="12 8 16 8 12 16" fill="currentColor" stroke="none"></polygon>
  </symbol>
</svg>